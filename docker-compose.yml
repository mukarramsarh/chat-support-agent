# ── support-ai · local stack ────────────────────────────────────────────────
# Single source of truth for DB credentials is the project .env file:
#   • Compose interpolates ${DB_NAME}/${DB_PASS} from .env to CREATE the MySQL
#     database + root password.
#   • The app container bind-mounts the same .env and reads it directly, so the
#     app connects with the identical credentials. Only DB_HOST/DB_PORT are
#     overridden here so the app targets the "db" service instead of 127.0.0.1.
#
# First run:
#   docker compose up -d --build
#   docker compose exec app php bin/console install
#   open http://localhost:8080/admin
services:
  app:
    build: .
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Point the app at the compose DB service. Everything else (APP_KEY,
      # provider keys, models, DB name/user/pass) comes from the mounted .env.
      DB_HOST: db
      DB_PORT: "3306"
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor   # keep image's vendor/, don't shadow with host

  db:
    image: mysql:9.1
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASS:-pass}"
      MYSQL_ROOT_HOST: "%"           # allow the app container to connect as root
      MYSQL_DATABASE: "${DB_NAME:-support_ai}"
    ports:
      - "3307:3306"                  # host:container (host 3307 avoids clashes)
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASS:-pass}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data:
