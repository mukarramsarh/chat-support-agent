# ── support-ai · local stack ────────────────────────────────────────────────
# Brings up the app (Apache/PHP) + MySQL 9 (so you can exercise the native
# VECTOR tier). First run:
#   docker compose up -d --build
#   docker compose exec app php bin/console install
#   open http://localhost:8080/admin   → create the owner account
services:
  app:
    build: .
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8080"
      APP_KEY: "change-me-to-a-32char-random-string!!"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: support_ai
      DB_USER: support
      DB_PASS: secret
      VECTOR_DRIVER: auto
      CHAT_PROVIDER: gemini
      CHAT_MODEL: gemini-flash-latest
      EMBEDDING_PROVIDER: openai
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIMENSIONS: "1536"
      MONTHLY_BUDGET_USD: "2.00"
      # Add your keys here or via an .env file:
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor

  db:
    image: mysql:9.1
    command: --mysql-native-password=ON
    environment:
      MYSQL_DATABASE: support_ai
      MYSQL_USER: support
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data:
